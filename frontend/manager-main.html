<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" href="stylesheets/manager-main.css">
	<title>PadPal for Managers | Dashboard</title>
</head>
<body>
	<div class="header">
		<div class="header-left"><p>PadPal Manager</p></div>
		<div class="header-right">
			<button class="create-listing"> + Create listing</button>
			<a href="" class="notification-icon">
				<div class="noti-wrapper">
					<i class="fa-solid fa-bell icon"></i>
				</div>
			</a>
			<a href="" class="profile-icon">
				<div class="pfp-wrapper">
					<i class="fa-solid fa-circle-user icon"></i>
				</div>
			</a>
		</div>
	</div>

	<div class="mainBody">
		<div class="titleIntro">
			<p class="title">My Listings</p>
			<p class="subtitle">Manage your properties and review active inquiries</p>
		</div>

		<div class="stat-container">
			<div class="stat">
				<div class="stat-title">
					<img src="assets/totalListings.svg" alt="">
					<p>Total Listings</p>
				</div>
				<div class="quantity-container">
					<p class="quantity">12</p>
				</div>
			</div>
			
			<div class="stat">
				<div class="stat-title">
					<img src="assets/activeInquiries.svg" alt="">
					<p>Active Inquiries</p>
				</div>
				<div class="quantity-container">
					<p class="quantity">47</p>
					<p class="quantityMsg activeInquiry">+5 this week</p>
				</div>
			</div>
			
			<div class="stat">
				<div class="stat-title">
					<img src="assets/activeInquiries.svg" alt="">
					<p>Avg. Match Score</p>
				</div>
				<div class="quantity-container">
					<p class="quantity">89%</p>
					<p class="quantityMsg avgMatchScore">Highly Compatible</p>
				</div>
			</div>
		</div>

		<div class="listings">
			
		</div>
	</div>
	
</body>
</html>
