<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PadPal – Group Profile</title>
  <link rel="stylesheet" href="padpal-group.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-left">
      <a href="padpal.html" class="btn-back">
        ← Back
      </a>

      <span class="nav-logo">PadPal</span>
    </div>
    <div class="nav-right">
      <button class="nav-icon" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <div class="avatar-nav">
        <img src="https://i.pravatar.cc/80?img=47" alt="Profile" />
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <img id="heroImg" src="" alt="Group hero" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div id="heroBadge" class="hero-badge"></div>
      <h1 id="heroTitle" class="hero-title"></h1>
      <div id="heroLocation" class="hero-location">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        <span></span>
      </div>
    </div>
  </div>

  <!-- BELOW HERO -->
  <div class="below-hero">
    <div id="avatarStack" class="avatar-stack"></div>
    <button id="btnApplyHero" class="btn-apply">Apply to Join</button>
  </div>

  <!-- MAIN GRID -->
  <div class="page-grid">

    <!-- LEFT COLUMN -->
    <div style="display:flex; flex-direction:column; gap:18px;">

      <!-- Our Vibe -->
      <div class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          Our Vibe
        </div>
        <p id="vibeDesc" class="vibe-desc"></p>
        <div id="vibeTags" class="tags"></div>
      </div>

      <!-- Eyeing This Space -->
      <div class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
          </svg>
          Eyeing This Space
        </div>
        <div class="listing">
          <img id="listingImg" class="listing-img" src="" alt="Listing" />
          <div class="listing-body">
            <div id="listingName" class="listing-name"></div>
            <div id="listingMeta" class="listing-meta">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              <span></span>
            </div>
            <p id="listingDesc" class="listing-desc"></p>
            <a href="#" class="listing-link">
              View Listing
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </a>
          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div style="display:flex; flex-direction:column; gap:18px;">

      <!-- Preferences -->
      <div class="card">
        <div class="card-title">Preferences</div>
        <div id="prefList" class="pref-list"></div>
      </div>

      <!-- Stats -->
      <div class="card">
        <div class="stats-grid">
          <div class="stat-box">
            <div id="statBudget" class="stat-value"></div>
            <div class="stat-label">Target Budget/mo</div>
          </div>
          <div class="stat-box">
            <div id="statMoveIn" class="stat-value"></div>
            <div class="stat-label">Move-in Date</div>
          </div>
          <div class="stat-box full">
            <div id="statLease" class="stat-value"></div>
            <div class="stat-label">Lease Length</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- APPLY MODAL -->
  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">

      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title">Apply to Join The Creative Collective</h2>
        <button id="btnClose" class="modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Form -->
      <form id="applyForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="fieldName">Full Name</label>
            <input id="fieldName" class="form-input" type="text" placeholder="Alex Johnson" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="fieldAge">Age</label>
            <input id="fieldAge" class="form-input" type="number" placeholder="21" min="18" max="99" required />
          </div>
        </div>

        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label">Gender</label>
          <div class="gender-group">
            <input class="gender-opt" type="radio" name="gender" id="gMale"     value="male" />
            <label class="gender-label" for="gMale">Male</label>

            <input class="gender-opt" type="radio" name="gender" id="gFemale"   value="female" />
            <label class="gender-label" for="gFemale">Female</label>

            <input class="gender-opt" type="radio" name="gender" id="gNonBin"   value="nonbinary" />
            <label class="gender-label" for="gNonBin">Non-binary</label>

            <input class="gender-opt" type="radio" name="gender" id="gOther"    value="other" />
            <label class="gender-label" for="gOther">Other</label>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label" for="fieldEmail">University Email</label>
          <input id="fieldEmail" class="form-input" type="email" placeholder="alex.j@university.edu" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="fieldNotes">Other Notes / Message</label>
          <textarea id="fieldNotes" class="form-textarea" placeholder="Tell us about yourself and why you'd be a great roommate…"></textarea>
        </div>
      </form>

      <!-- Success -->
      <div id="modalSuccess" class="modal-success">
        <div class="success-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="success-title">Application Sent!</div>
        <div class="success-sub">The Creative Collective will be in touch soon.</div>
      </div>

      <!-- Footer -->
      <div id="modalFooter" class="modal-footer">
        <button id="btnCancel" class="btn-cancel" type="button">Cancel</button>
        <button class="btn-submit" type="submit" form="applyForm">
          Submit Application
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <script src="padpal-group.js"></script>
</body>
</html>
