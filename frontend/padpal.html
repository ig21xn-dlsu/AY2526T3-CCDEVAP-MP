<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PadPal – Discover Communities</title>
  <link rel="stylesheet" href="stylesheets/padpal.css" />
</head>
<body>

  <!-- Top Navigation -->
  <nav>
    <span class="nav-logo">PadPal</span>
    <div class="nav-right">
      <button class="nav-icon" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button class="nav-icon" aria-label="Saved">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
      <button class="btn-your-group">Your Group</button>
      <div class="avatar-nav" aria-label="Profile">
        <svg viewBox="0 0 24 24">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main>
    <h1 class="page-title">Discover Communities</h1>
    <p class="page-sub">Find the perfect group or space that matches your vibe.</p>

    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <button class="tab active" role="tab" aria-selected="true"  data-tab="coliving">Co-Living Groups</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="shared">Shared Spaces</button>
        <a href="padpal-create-group.html" class="btn-create-group"> + Create New Group </a>
    </div>

    <!-- Search / Filters -->
    <div class="search-row">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" class="search-input" type="text" placeholder="Search universities, majors, or keywords…" />
      </div>
      
      <!-- Filters are based on hardcoded values for now -->
      <select class="filter-select" id="campusFilter">
          <option value="">Any Campus</option>
          <option value="De La Salle University">De La Salle University</option>
          <option value="DLSU-CSB">DLSU-CSB</option>
          <option value="UP Manila">UP Manila</option>
      </select>

      <select class="filter-select" id="genderFilter">
          <option value="">Gender: Any</option>
          <option value="Co-ed">Co-ed</option>
          <option value="All Girls">All Girls</option>
      </select>

      <select class="filter-select" id="budgetFilter">
          <option value="">Budget: Any</option>
          <option value="15000">Below P15,000</option>
          <option value="20000">Below P20,000</option>
          <option value="30000">Below P30,000</option>
      </select>
    </div>

    <!-- Group Cards -->
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="empty" id="emptyState">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      No groups match your search. Try different keywords.
    </div>
  </main>

  <script src="../scripts/padpal.js"></script>
</body>
</html>
