<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PadPal – Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="stylesheets/profile.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <span class="brand">PadPal</span>
    <div class="nav-actions">
      <a href="create-listing.html" class="btn-create">Create Listing</a>
      <button class="icon-btn" id="notif-btn" aria-label="Notifications">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <div class="avatar-wrapper" id="avatar-btn">
        <img src="https://i.pravatar.cc/40?img=12" alt="Alex Rivera" class="avatar" />
      </div>
    </div>
  </nav>

  <!-- DROPDOWN MENU -->
  <div class="dropdown" id="dropdown" role="menu" aria-hidden="true">
    <div class="dropdown-profile">
      <img src="https://i.pravatar.cc/48?img=12" alt="Alex Rivera" class="dropdown-avatar" />
      <div class="dropdown-info">
        <span class="dropdown-name">Alex Rivera</span>
        <span class="dropdown-email">alex.rivera@dlsu.edu.ph</span>
      </div>
    </div>
    <div class="dropdown-divider"></div>
    <div class="dropdown-item" id="dark-mode-toggle" role="menuitem">
      <span class="item-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </span>
      <span>Dark Mode</span>
      <label class="toggle-switch" aria-label="Toggle dark mode">
        <input type="checkbox" id="dark-mode-checkbox" />
        <span class="toggle-track"></span>
      </label>
    </div>
    <a class="dropdown-item" href="profile-modal.html" role="menuitem" id="settings-link">
      <span class="item-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </span>
      <span>Settings</span>
    </a>
    <div class="dropdown-divider"></div>
    <div class="dropdown-item logout" role="menuitem">
      <span class="item-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <a href="../index.html" class="dropdown-link">Logout</a>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="welcome-block">
      <h1 class="welcome-heading">Welcome back, Alex.</h1>
      <p class="welcome-sub">You have 3 new roommate matches and 2 pending housing applications to review today.</p>
    </div>

    <div class="card-row">
      <div class="card saved-card">
        <button class="heart-btn" aria-label="Save">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <div class="card-label">SAVED LISTINGS</div>
        <div class="card-number">12</div>
      </div>
      <div class="card placeholder-card"></div>
      <div class="card placeholder-card"></div>
    </div>
  </main>

  <script src="../scripts/profile.js"></script>
</body>
</html>
